<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alimentaire - Mouvements</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/stock-alim.css}">
</head>
<body class="stock-page">
<aside th:replace="stockAlim/fragments :: sidebar('mouvements')"></aside>

<main class="stock-main">
    <div class="page-top">
        <div>
            <h1 class="page-title">Mouvements de stock</h1>
            <p class="page-subtitle">Journal global des entrées et sorties.</p>
        </div>
        <div class="actions">
            <a class="btn btn-primary" th:href="@{/stockAlim/approvisionnements/new}">Approvisionnement</a>
            <a class="btn btn-secondary" th:href="@{/stockAlim/consommations/new}">Consommation</a>
        </div>
    </div>

    <section class="card card-pad">
        <form class="filters" th:action="@{/stockAlim/mouvements}" method="get">
            <input class="input" type="date" name="du" th:value="${du}">
            <input class="input" type="date" name="au" th:value="${au}">
            <select class="select" name="typeId">
                <option value="">Tous les types</option>
                <option th:each="type : ${types}" th:value="${type.id}" th:text="${type.libelle}" th:selected="${typeId != null and type.id == typeId}"></option>
            </select>
            <button class="btn btn-secondary" type="submit">Filtrer</button>
        </form>

        <div class="table-wrap">
            <table class="table">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Fournisseur</th>
                    <th>Motif</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(mouvements)}">
                    <td colspan="5" class="empty">Aucun mouvement trouvé.</td>
                </tr>
                <tr th:each="mouvement : ${mouvements}" th:if="${!#lists.isEmpty(mouvements)}">
                    <td th:text="${mouvement.dateMvt}">Date</td>
                    <td th:text="${mouvement.type != null ? mouvement.type.libelle : '-'}">Type</td>
                    <td th:text="${mouvement.fournisseur != null ? mouvement.fournisseur.nom : '-'}">Fournisseur</td>
                    <td th:text="${mouvement.motif}">Motif</td>
                    <td><a class="btn btn-secondary btn-small" th:href="@{/stockAlim/mouvements/{id}(id=${mouvement.id})}">Voir détails</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
