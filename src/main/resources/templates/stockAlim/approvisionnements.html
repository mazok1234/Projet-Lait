<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alimentaire - Approvisionnements</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/stock-alim.css}">
</head>
<body class="stock-page">
<aside th:replace="stockAlim/fragments :: sidebar('approvisionnements')"></aside>

<main class="stock-main">
    <div class="page-top">
        <div>
            <h1 class="page-title">Approvisionnements</h1>
            <p class="page-subtitle">Historique des entrées de stock par aliment et fournisseur.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/stockAlim/approvisionnements/new}"><i class="fas fa-plus"></i>Nouvel approvisionnement</a>
    </div>

    <section class="card card-pad">
        <form class="filters" th:action="@{/stockAlim/approvisionnements}" method="get">
            <input class="input" type="date" name="du" th:value="${du}">
            <input class="input" type="date" name="au" th:value="${au}">
            <select class="select" name="fournisseurId">
                <option value="">Tous les fournisseurs</option>
                <option th:each="fournisseur : ${fournisseurs}" th:value="${fournisseur.id}" th:text="${fournisseur.nom}" th:selected="${fournisseurId != null and fournisseur.id == fournisseurId}"></option>
            </select>
            <input class="input" type="search" name="q" placeholder="Rechercher..." th:value="${q}">
            <button class="btn btn-secondary" type="submit">Filtrer</button>
        </form>

        <div class="table-wrap">
            <table class="table">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Fournisseur</th>
                    <th>Aliment</th>
                    <th>Quantité</th>
                    <th>Prix unitaire</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(lignes)}">
                    <td colspan="6" class="empty">Aucun approvisionnement trouvé.</td>
                </tr>
                <tr th:each="ligne : ${lignes}" th:if="${!#lists.isEmpty(lignes)}">
                    <td th:text="${ligne.mouvementStock.dateMvt}">Date</td>
                    <td th:text="${ligne.mouvementStock.fournisseur != null ? ligne.mouvementStock.fournisseur.nom : '-'}">Fournisseur</td>
                    <td th:text="${ligne.aliment.nom}">Aliment</td>
                    <td th:text="${ligne.quantite}">0</td>
                    <td th:text="${ligne.prixUnitaire}">0</td>
                    <td>
                        <a class="btn btn-secondary btn-small" th:href="@{/stockAlim/mouvements/{id}(id=${ligne.mouvementStock.id})}">Détails</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
