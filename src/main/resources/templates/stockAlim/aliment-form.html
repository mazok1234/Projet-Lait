<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alimentaire - Aliment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/stock-alim.css}">
</head>
<body class="stock-page">
<aside th:replace="stockAlim/fragments :: sidebar('aliments')"></aside>

<main class="stock-main">
    <div class="page-top">
        <div>
            <h1 class="page-title" th:text="${mode == 'modification' ? 'Modifier l’aliment' : 'Ajouter un aliment'}">Aliment</h1>
            <p class="page-subtitle">Formulaire basé sur la table Aliments de base.sql.</p>
        </div>
    </div>

    <section class="card card-pad" style="max-width:760px;">
        <form th:action="@{/stockAlim/aliments}" method="post">
            <input type="hidden" name="id" th:value="${aliment.id}">

            <div th:if="${errors != null and !#lists.isEmpty(errors)}" style="margin-bottom:16px;padding:12px;border:1px solid #f5c2c7;background:#f8d7da;color:#842029;border-radius:8px;">
                <strong>Veuillez corriger les erreurs suivantes:</strong>
                <ul style="margin:8px 0 0 18px;">
                    <li th:each="err : ${errors}" th:text="${err}">Erreur</li>
                </ul>
            </div>

            <div class="form-grid">
                <label class="form-field">
                    <span>Désignation</span>
                    <input class="input" type="text" name="nom" th:value="${aliment.nom}" required>
                </label>

                <label class="form-field">
                    <span>Unité</span>
                    <input class="input" type="text" name="unite" th:value="${aliment.unite}" placeholder="Kg, L, sac...">
                </label>

                <label class="form-field">
                    <span>Seuil stock min</span>
                    <input class="input" type="number" step="0.01" min="0" name="seuilStockMin" th:value="${aliment.seuilStockMin}">
                </label>

                <label class="form-field">
                    <span>Prix achat</span>
                    <input class="input" type="number" step="0.01" min="0" name="prixAchat" th:value="${aliment.prixAchat}">
                </label>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit" th:text="${mode == 'modification' ? 'Mettre à jour' : 'Enregistrer'}">Enregistrer</button>
                <a class="btn btn-secondary" th:href="@{/stockAlim/aliments}">Annuler</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
