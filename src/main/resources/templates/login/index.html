<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lait's Go - Connexion</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-cow"></i>
            <span>Lait's Go</span>
        </div>
        <p class="auth-subtitle">Connectez-vous a votre espace</p>

        <div class="auth-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <div class="auth-field">
                <label for="email">Email</label>
                <div class="auth-input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" th:value="${email}" placeholder="nom@laitsgo.com" required autofocus>
                </div>
            </div>

            <div class="auth-field">
                <label for="password">Mot de passe</label>
                <div class="auth-input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="********" required>
                </div>
            </div>

            <button type="submit" class="auth-submit">
                Se connecter
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>
    </div>

</body>
</html>
