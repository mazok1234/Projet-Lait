<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:replace="finance/index :: layout(contenu=~{::.contenu})">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lait's Go - Caisse</title>
</head>
<body>
<div class="contenu">
    <div class="page-content">
        <div class="page-header">
            <h1 class="page-title">Caisse</h1>
            <p class="page-subtitle">Gestion financière et suivi des transactions</p>
        </div>

        <div class="stats-grid">
            <div class="card">
                <div class="card-icon" style="background-color: #E8F5E9; color: #2E7D32;">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="card-body">
                    <h3 class="card-label">Solde actuel</h3>
                    <p class="card-value" th:text="${#numbers.formatDecimal(solde, 1, 2)} + ' Ar'">0,00 Ar</p>
                </div>
            </div>
        </div>

        <div class="content-grid" style="grid-template-columns: 1fr;">
            <div class="card card-table">
                <div class="card-header">
                    <h2 class="card-title">5 dernières transactions</h2>
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Source</th>
                                <th>Type d'opération</th>
                                <th>Montant</th>
                                <th>Description</th>
                                <th>Date</th>
                                <th>Utilisateur</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="t : ${transactions}">
                                <td th:text="${t.sourceType} + ' #' + ${t.sourceId}">Commande #5</td>
                                <td>
                                    <span th:text="${t.type.libelle == 'recette' ? 'Entrée' : 'Sortie'}" 
                                          th:classappend="${t.type.libelle == 'recette' ? 'badge badge-success' : 'badge badge-danger'}"></span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(t.montant, 1, 2)} + ' Ar'">0,00 Ar</td>
                                <td th:text="${t.description}">Description</td>
                                <td th:text="${#temporals.format(t.dateTrans, 'dd/MM/yyyy HH:mm')}">01/01/2025 00:00</td>
                                <td th:text="${t.utilisateur != null ? t.utilisateur.nom : '—'}">Admin</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(transactions)}">
                                <td colspan="6">
                                    <div class="empty-state">
                                        <i class="fas fa-inbox"></i>
                                        <p>Aucune transaction pour le moment</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/finance/historique" class="btn btn-primary">
                <i class="fas fa-history"></i>
                Voir historique
            </a>
        </div>
    </div>
</div>
</body>
</html>
