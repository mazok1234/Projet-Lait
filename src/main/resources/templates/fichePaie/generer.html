<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Générer une fiche de paie</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            background: #f5f6fa;
            min-height: 100vh;
        }

        /* Sidebar */

        .sidebar {
            width: 220px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo h2 {
            color: #0d6efd;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: #333;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .menu a.active {
            background: #0d6efd;
            color: white;
        }

        /* Content */

        .content {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.08);
            max-width: 500px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 14px;
            color: #444;
            font-weight: bold;
        }

        .form-group select,
        .form-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            background: white;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #0d6efd;
        }

        .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .btn-submit {
            padding: 12px 20px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        .btn-submit:hover {
            background: #0b5ed7;
        }

        .back-link {
            display: inline-block;
            margin-top: 14px;
            font-size: 14px;
            color: #0d6efd;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="sidebar">

    <div class="logo">
        <h2>Lait's Go</h2>
        <p>Dairy Logistics</p>
    </div>

    <div class="menu">

        <a href="/fichePaie/list">Liste des fiches de paie</a>
    </div>

</div>

<div class="content">

    <h1>Générer une fiche de paie</h1>

    <div class="card">

        <p class="error-msg" th:if="${error}" th:text="${error}"></p>

        <form th:action="@{/fichePaie/generate}" method="get">

            <div class="form-group">
                <label for="employeId">Employé</label>
                <select id="employeId" name="employeId" required>
                    <option value="">-- Sélectionner un employé --</option>
                    <option
                        th:each="employe : ${employes}"
                        th:value="${employe.id}"
                        th:text="${employe.utilisateur.nom}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="datepaie">Date de paiement</label>
                <input
                    type="date"
                    id="datepaie"
                    name="datepaie"
                    required>
            </div>

            <button class="btn-submit" type="submit" href="/fichePaie/generate">
                Générer
            </button>

        </form>

        <a class="back-link" th:href="@{/fichePaie/list}">
            ← Retour à la liste
        </a>

    </div>

</div>

</body>
</html>
